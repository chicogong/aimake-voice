name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Typecheck
        run: cd frontend && npm run typecheck

      - name: Test
        run: cd frontend && npx vitest run

      - name: Build
        # Vite loads VITE_* from frontend/.env.production at build time —
        # don't pass them via `env:` here, since GH-secret-backed vars that
        # resolve to empty silently override the committed .env file.
        run: cd frontend && npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: aimake-app
          directory: frontend/dist
          # Must match the project's production branch in the Cloudflare dashboard,
          # otherwise the deploy lands as a preview alias (e.g. master.aimake-app.pages.dev).
          branch: master
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
