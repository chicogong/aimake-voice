name: Deploy API

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd api && npm ci

      - name: Typecheck
        run: cd api && npm run typecheck

      - name: Test
        run: cd api && npx vitest run

      # Apply D1 migrations before deploying so the schema is in place for the
      # new code. Runs non-interactively in CI; a failure here stops the job
      # before Deploy, so code is never shipped against an un-migrated schema.
      - name: Apply D1 migrations
        run: cd api && npx wrangler d1 migrations apply aimake-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy
        run: cd api && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
